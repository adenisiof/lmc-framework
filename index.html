<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .calculadora {
      background-color: #007BFF; /* Azul */
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
    #resultado {
      width: 100%;
      height: 40px;
      font-size: 18px;
      margin-bottom: 10px;
      text-align: right;
      padding: 5px;
      border: none;
      border-radius: 5px;
    }
    .botoes {
      display: grid;
      grid-template-columns: repeat(4, 60px);
      gap: 10px;
    }
    button {
      height: 50px;
      font-size: 18px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background-color: #FFD700; /* Amarelo */
      color: #000;
    }
    button:hover {
      background-color: #FFC107;
    }
  </style>
</head>
<body>
  <div class="calculadora">
    <input type="text" id="resultado" disabled>
    <div class="botoes">
      <button onclick="adicionar('7')">7</button>
      <button onclick="adicionar('8')">8</button>
      <button onclick="adicionar('9')">9</button>
      <button onclick="adicionar('/')">÷</button>

      <button onclick="adicionar('4')">4</button>
      <button onclick="adicionar('5')">5</button>
      <button onclick="adicionar('6')">6</button>
      <button onclick="adicionar('*')">×</button>

      <button onclick="adicionar('1')">1</button>
      <button onclick="adicionar('2')">2</button>
      <button onclick="adicionar('3')">3</button>
      <button onclick="adicionar('-')">−</button>

      <button onclick="adicionar('0')">0</button>
      <button onclick="adicionar('.')">.</button>
      <button onclick="calcular()">=</button>
      <button onclick="adicionar('+')">+</button>

      <button onclick="limpar()" style="grid-column: span 4; background-color:#FF6347; color:#fff;">C</button>
    </div>
  </div>

  <script>
    function adicionar(valor) {
      document.getElementById('resultado').value += valor;
    }

    function limpar() {
      document.getElementById('resultado').value = '';
    }

    function calcular() {
      const expressao = document.getElementById('resultado').value;
      try {
        if (expressao.includes('/0')) {
          alert("Erro: Divisão por zero não é permitida!");
          return;
        }
        document.getElementById('resultado').value = eval(expressao);
      } catch {
        alert("Expressão inválida!");
      }
    }
  </script>
</body>
</html>
