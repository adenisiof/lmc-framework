<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora teste</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .calculadora {
      width: 300px;
      height: 420px;
      background-color: #0057b8;
      border-radius: 15px;
      padding: 15px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .logo {
      position: absolute;
      top: 12px;
      left: 12px;
    }

    .logo img {
      width: 25px;
      height: 25px;
      object-fit: contain;
    }

    h1 {
      color: #ffffff;
      text-align: center;
      font-size: 22px;
      margin: 0 0 12px 0;
    }

    #display {
      width: 100%;
      height: 50px;
      font-size: 23px;
      text-align: right;
      padding: 8px;
      border: none;
      border-radius: 8px;
      box-sizing: border-box;
      margin-bottom: 12px;
      background-color: #ffffff;
      color: #0057b8;
    }

    .botoes {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      flex: 1;
    }

    button {
      font-size: 20px;
      font-weight: bold;
      background-color: #ffd700;
      color: #0057b8;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background-color: #ffffff;
    }

    .limpar {
      width: 100%;
      height: 42px;
      margin-top: 10px;
      background-color: #ffffff;
      color: #0057b8;
    }
  </style>
</head>

<body>

  <main class="calculadora">

    <div class="logo">
      <img src="img/logo.png" alt="Logo">
    </div>

    <h1>Calculadora teste</h1>

    <input type="text" id="display" readonly>

    <div class="botoes">
      <button onclick="adicionarNumero('1')">1</button>
      <button onclick="adicionarNumero('2')">2</button>
      <button onclick="adicionarNumero('3')">3</button>
      <button onclick="adicionarOperador('+')">+</button>

      <button onclick="adicionarNumero('4')">4</button>
      <button onclick="adicionarNumero('5')">5</button>
      <button onclick="adicionarNumero('6')">6</button>
      <button onclick="adicionarOperador('-')">-</button>

      <button onclick="adicionarNumero('7')">7</button>
      <button onclick="adicionarNumero('8')">8</button>
      <button onclick="adicionarNumero('9')">9</button>
      <button onclick="adicionarOperador('/')">/</button>

      <button onclick="adicionarNumero('.')">.</button>
      <button onclick="adicionarNumero('0')">0</button>
      <button onclick="adicionarOperador('*')">*</button>
      <button onclick="calcular()">=</button>
    </div>

    <button class="limpar" onclick="limparDisplay()">Limpar</button>
  </main>

  <script>
    const display = document.getElementById("display");
    let resultadoMostrado = false;

    function adicionarNumero(valor) {
      if (resultadoMostrado) {
        display.value = "";
        resultadoMostrado = false;
      }

      const partes = display.value.split(/[+\-*/]/);
      const ultimoNumero = partes[partes.length - 1];

      if (valor === "." && ultimoNumero.includes(".")) {
        return;
      }

      if (ultimoNumero.length >= 5 && valor !== ".") {
        return;
      }

      display.value += valor;
    }

    function adicionarOperador(operador) {
      if (display.value === "") {
        return;
      }

      if (resultadoMostrado) {
        resultadoMostrado = false;
      }

      const ultimoCaractere = display.value.slice(-1);

      if ("+-*/".includes(ultimoCaractere)) {
        return;
      }

      const operadores = display.value.match(/[+\-*/]/g);

      if (operadores && operadores.length >= 5) {
        return;
      }

      display.value += operador;
    }

    function calcular() {
      if (display.value === "") {
        return;
      }

      const ultimoCaractere = display.value.slice(-1);

      if ("+-*/".includes(ultimoCaractere)) {
        return;
      }

      if (temDivisaoPorZero(display.value)) {
        display.value = "Erro: divisão por zero";
        resultadoMostrado = true;
        return;
      }

      try {
        const resultado = Function('"use strict"; return (' + display.value + ')')();
        display.value = resultado;
        resultadoMostrado = true;
      } catch (erro) {
        display.value = "Erro";
        resultadoMostrado = true;
      }
    }

    function limparDisplay() {
      display.value = "";
      resultadoMostrado = false;
    }

    function temDivisaoPorZero(expressao) {
      const partes = expressao.split("/");

      for (let i = 1; i < partes.length; i++) {
        const numero = parseFloat(partes[i]);

        if (numero === 0) {
          return true;
        }
      }

      return false;
    }
  </script>

</body>
</html>
